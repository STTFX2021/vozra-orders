name: Trigger system prompt fix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-tested-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract and apply focused patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/apply-system-prompt-fix.yml').read_text(encoding='utf-8')
          marker = "          python3 <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          block = workflow[start:end]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in block.splitlines()) + "\n"
          Path('/tmp/apply-system-prompt-fix.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/apply-system-prompt-fix.py

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Commit tested implementation to feature branch
        shell: bash
        run: |
          rm -f .github/workflows/apply-system-prompt-fix.yml
          rm -f .github/workflows/trigger-system-prompt-fix-on-pr.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: make brain the single system prompt source"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
