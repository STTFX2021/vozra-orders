name: Revalidate demo callback

on:
  push:
    branches:
      - feature/demo-callback-integration

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/demo-callback-integration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: |
          node --check demo-callback.routes.js
          node --check test-demo-callback.cjs
          npm test
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/revalidate-demo-callback.yml
          git commit -m "Revalidate callback normalization fix"
          git push origin HEAD:feature/demo-callback-integration
